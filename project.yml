name: EasySleepAndShutdown

options:
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "12.0"

configs:
  Debug: debug
  Release: release

settings:
  base:
    PRODUCT_NAME: Easy Sleep & Shutdown
    PRODUCT_BUNDLE_IDENTIFIER: com.easysleepshutdown.app
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    MACOSX_DEPLOYMENT_TARGET: 12.0
    SWIFT_VERSION: 5.7
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: Resources/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
  configs:
    Debug:
      CODE_SIGN_ENTITLEMENTS: EasySleepShutdown.Debug.entitlements
      CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
      ENABLE_APP_SANDBOX: YES
    Release:
      CODE_SIGN_ENTITLEMENTS: EasySleepShutdown.entitlements
      CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
      ENABLE_APP_SANDBOX: YES

targets:
  EasySleepShutdown:
    type: application
    platform: macOS
    sources:
      - Sources/EasySleepShutdown
      - path: Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
      - path: Resources/SystemActions.applescript
        buildPhase: resources
    info:
      path: Resources/Info.plist
      properties:
        LSApplicationCategoryType: public.app-category.utilities
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        ITSAppUsesNonExemptEncryption: false
        NSAppleEventsUsageDescription: "Easy Sleep & Shutdown runs a user-installed script when you choose Sleep or Shutdown."
    settings:
      base:
        PRODUCT_MODULE_NAME: EasySleepShutdown
        EXECUTABLE_NAME: EasySleepShutdown

schemes:
  EasySleepShutdown:
    build:
      targets:
        EasySleepShutdown: all
    run:
      config: Debug
    archive:
      config: Release
