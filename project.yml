name: EasySleepAndShutdown

options:
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "12.0"

configs:
  Debug: debug
  Release: release

settings:
  base:
    PRODUCT_NAME: Easy Sleep & Shutdown
    PRODUCT_BUNDLE_IDENTIFIER: com.easysleepshutdown.app
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    MACOSX_DEPLOYMENT_TARGET: 12.0
    SWIFT_VERSION: 5.7
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: Resources/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
  configs:
    Debug:
      CODE_SIGN_ENTITLEMENTS: EasySleepShutdown.Debug.entitlements
      ENABLE_APP_SANDBOX: NO
    Release:
      CODE_SIGN_ENTITLEMENTS: EasySleepShutdown.entitlements
      ENABLE_APP_SANDBOX: YES

targets:
  EasySleepShutdown:
    type: application
    platform: macOS
    sources:
      - Sources/EasySleepShutdown
    resources:
      - Resources/Assets.xcassets
      - Resources/PrivacyInfo.xcprivacy
      - Resources/en.lproj/InfoPlist.strings
      - Resources/ja.lproj/InfoPlist.strings
      - Resources/de.lproj/InfoPlist.strings
      - Resources/fr.lproj/InfoPlist.strings
      - Resources/it.lproj/InfoPlist.strings
      - Resources/es.lproj/InfoPlist.strings
      - Resources/pt.lproj/InfoPlist.strings
      - Resources/nl.lproj/InfoPlist.strings
      - Resources/sv.lproj/InfoPlist.strings
      - Resources/da.lproj/InfoPlist.strings
      - Resources/nb.lproj/InfoPlist.strings
      - Resources/fi.lproj/InfoPlist.strings
      - Resources/zh-Hant.lproj/InfoPlist.strings
      - Resources/zh-Hans.lproj/InfoPlist.strings
      - Resources/ko.lproj/InfoPlist.strings
    info:
      path: Resources/Info.plist
      properties:
        LSApplicationCategoryType: public.app-category.utilities
        ITSAppUsesNonExemptEncryption: false
        NSAppleEventsUsageDescription: Easy Sleep & Shutdown needs permission to send the system shutdown request when you explicitly start a shutdown timer.
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        CFBundleLocalizations:
          - en
          - ja
          - de
          - fr
          - it
          - es
          - pt
          - nl
          - sv
          - da
          - nb
          - fi
          - zh-Hant
          - zh-Hans
          - ko
    settings:
      base:
        PRODUCT_MODULE_NAME: EasySleepShutdown
        EXECUTABLE_NAME: EasySleepShutdown

schemes:
  EasySleepShutdown:
    build:
      targets:
        EasySleepShutdown: all
    run:
      config: Debug
    archive:
      config: Release
